<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RDZ Agent — Feuille de route</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --rdz-red: #8B1A1A;
    --rdz-red-dark: #6B1212;
    --rdz-red-light: #f5e8e8;
    --rdz-black: #1a1a1a;
    --rdz-gray: #4a4a4a;
    --rdz-border: #d0ccc5;
    --rdz-bg: #f5f4f2;
  }
  html, body { height: 100%; }
  body { font-family: Arial, Helvetica, sans-serif; background: var(--rdz-bg); color: var(--rdz-black); min-height: 100vh; }

  .app-header { background: var(--rdz-red); padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .app-header-txt { display: flex; flex-direction: column; gap: 2px; }
  .app-header-name { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: .06em; text-transform: uppercase; }
  .app-header-sub { font-size: 10.5px; color: rgba(255,255,255,.65); }
  .back-btn { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.4); color: #fff; font-size: 12px; font-weight: 700; padding: 7px 12px; border-radius: 2px; text-decoration: none; white-space: nowrap; cursor: pointer; }
  .back-btn:active { background: rgba(255,255,255,.3); }

  .content { padding: 16px; padding-bottom: 40px; }

  .filter-bar { background: #fff; border: 1px solid var(--rdz-border); border-radius: 2px; padding: 14px; margin-bottom: 16px; }
  .filter-bar label { font-size: 10.5px; font-weight: 700; color: var(--rdz-gray); text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 6px; }
  .filter-bar input[type="date"] { width: 100%; padding: 10px 12px; border-radius: 2px; border: 1px solid var(--rdz-border); font-size: 14.5px; background: #fff; color: var(--rdz-black); }

  .sheet-pick { background: #fff; border: 1px solid var(--rdz-border); border-left: 4px solid var(--rdz-black); border-radius: 2px; padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .sheet-pick:active { background: var(--rdz-bg); }
  .sheet-pick-cat { font-size: 9.5px; font-weight: 700; color: var(--rdz-gray); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .sheet-pick-name { font-size: 14.5px; font-weight: 700; }
  .sheet-pick-shift { font-size: 11.5px; color: var(--rdz-gray); margin-top: 3px; font-family: monospace; }
  .sheet-pick-sites { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .site-pill { font-size: 9.5px; font-weight: 700; color: #fff; padding: 2px 8px; border-radius: 20px; }

  .state-msg { text-align: center; padding: 50px 20px; }
  .state-msg .ico { font-size: 32px; margin-bottom: 12px; }
  .state-msg p { font-size: 13.5px; color: var(--rdz-gray); }

  /* SHEET DETAIL */
  .sheet-banner { background: var(--rdz-black); color: #fff; padding: 14px 16px; border-radius: 2px; margin-bottom: 14px; }
  .sheet-banner-cat { font-size: 9.5px; color: rgba(255,255,255,.55); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .sheet-banner-name { font-size: 16px; font-weight: 700; }
  .sheet-banner-shift { font-size: 11.5px; color: rgba(255,255,255,.7); margin-top: 4px; font-family: monospace; }
  .back-to-select { background: none; border: none; color: var(--rdz-gray); font-size: 12px; text-decoration: underline; padding: 0 0 12px; cursor: pointer; display: block; }

  .obs-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 2px; padding: 10px 12px; margin-bottom: 14px; font-size: 12px; color: #78350f; line-height: 1.5; }
  .obs-lbl { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #92400e; margin-bottom: 3px; }

  .task-card { background: #fff; border: 1px solid var(--rdz-border); border-radius: 2px; padding: 12px 14px; margin-bottom: 10px; }
  .task-card.fixed { border-left: 4px solid #d97706; }
  .task-card.alert { border-left: 4px solid #dc2626; background: #fef2f2; }
  .task-card.pause { background: #fafafa; }
  .task-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .task-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .task-name { font-size: 13.5px; font-weight: 700; flex: 1; }
  .task-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
  .task-badge.fixed { background: #fef3c7; color: #92400e; }
  .task-badge.alert { background: #fee2e2; color: #dc2626; }
  .task-scheduled { font-family: monospace; font-size: 11px; color: var(--rdz-gray); margin-bottom: 6px; }
  .task-desc { font-size: 11px; color: var(--rdz-gray); line-height: 1.4; margin-bottom: 6px; }
  .task-note { font-size: 10.5px; color: #ea580c; font-style: italic; margin-bottom: 6px; }

  .real-times { display: flex; gap: 10px; border-top: 1px dashed var(--rdz-border); padding-top: 8px; margin-top: 4px; }
  .real-time-field { flex: 1; }
  .real-time-lbl { font-size: 9px; font-weight: 700; color: var(--rdz-gray); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
  .real-time-input { width: 100%; padding: 6px 8px; border: none; border-bottom: 1.5px dashed var(--rdz-border); background: transparent; font-family: monospace; font-size: 14px; color: var(--rdz-black); font-weight: 700; }
  .real-time-input:focus { outline: none; border-bottom-color: var(--rdz-red); }
  .save-ok { color: #1e5c2e; font-size: 10px; opacity: 0; transition: opacity .3s; }
  .save-ok.show { opacity: 1; }
  .note-field { border-top: 1px dashed var(--rdz-border); padding-top: 8px; margin-top: 8px; }
  .note-input { width: 100%; padding: 6px 8px; border: 1px solid var(--rdz-border); border-radius: 2px; background: var(--rdz-bg); font-family: Arial, sans-serif; font-size: 12.5px; color: var(--rdz-black); resize: vertical; min-height: 40px; }
  .note-input:focus { outline: none; border-color: var(--rdz-red); background: #fff; }
  .saved-by-line { font-size: 9.5px; color: #9a9a9a; margin-top: 6px; text-align: right; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-header-txt">
    <div class="app-header-name">RDZ Security Management</div>
    <div class="app-header-sub" id="header-sub">Feuille de route</div>
  </div>
  <div style="text-align:right;flex-shrink:0">
    <a class="back-btn" href="mobile.html">‹ Retour</a>
    <div style="font-size:10px;color:rgba(255,255,255,.65);margin-top:5px" id="agent-badge"></div>
  </div>
</div>

<div class="content">

  <div id="screen-select">
    <div class="filter-bar">
      <label for="date-picker">Date</label>
      <input type="date" id="date-picker" onchange="onDateChange()">
    </div>
    <div id="sheets-list">
      <div class="state-msg"><div class="ico">⏳</div><p>Chargement…</p></div>
    </div>
  </div>

  <div id="screen-sheet" style="display:none">
    <button class="back-to-select" onclick="backToSelect()">‹ Changer de feuille / date</button>
    <div id="sheet-detail"></div>
  </div>

</div>

<script>
// ═══ CONFIG — deux Supabase distincts ═══
// 1) RouteOps (lecture seule) : planning théorique
const RO_URL = 'https://trdhtlcenmjlcvzuplid.supabase.co';
const RO_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyZGh0bGNlbm1qbGN2enVwbGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTE2NzQsImV4cCI6MjA5MjAyNzY3NH0.8r-ITHC-w28vQ4_FKI6Hbwg4AYVqYR0i-69_oHSD5DU';
// 2) RDZ Agent (lecture/écriture) : heures réelles saisies par les agents
const SUPABASE_URL = 'https://pdewmubikmotqzbxmyeq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkZXdtdWJpa21vdHF6YnhteWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDU3MjgsImV4cCI6MjA5NDg4MTcyOH0.SRuhERPmB5_7a58nJ5oMg4a8mujnoLBv8dxkxvyNWao';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const AGENT_ID = localStorage.getItem('rdz_agent_id');
const AGENT_NOM = localStorage.getItem('rdz_agent_nom');
if (!AGENT_ID) { window.location.href = 'mobile.html'; }

// ═══ STATE (même structure que RouteOps) ═══
let S = { sites: [], missions: [], sheets: [], travel: {} };
let pointagesMap = {}; // task_index -> { heure_arrivee_reelle, heure_depart_reelle }
let currentSheet = null;

// ═══ HELPERS (portés depuis RouteOps) ═══
function todayStr() { return new Date().toISOString().slice(0,10); }
function tMin(t) {
  if (!t || !t.includes(':')) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}
function minToT(m) {
  m = ((m%1440)+1440)%1440;
  return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');
}
function fmtDateShort(ds) {
  if (!ds) return '';
  const d = new Date(ds+'T12:00');
  return d.toLocaleDateString('fr-CH',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
}
function getMission(id) { return S.missions.find(m => m.id === id); }
function getSite(id) { return S.sites.find(s => s.id === id); }
function getTravelTime(a,b) {
  if (!a || !b || a === b) return 0;
  return S.travel[a]?.[b] ?? S.travel[b]?.[a] ?? 15;
}
function getInstancesForDate(date) {
  return S.sheets.filter(s => !s.isTemplate && s.date === date);
}
function calcSheetTimes(sh) {
  let cur = tMin(sh.startTime) || 0;
  let lastSite = null;
  return sh.tasks.map(task => {
    const m = getMission(task.mId);
    if (!m) return { ...task, startTime:'', endTime:'', travelMin:0, alert:false };
    let travel = 0, alert = false;
    if (task.fixedStart) {
      let ft = tMin(task.fixedStart);
      if (ft !== null) {
        if (ft < cur-120) ft += 1440;
        if (ft < cur) { alert = true; }
        else { cur = ft; }
      }
    } else {
      if (lastSite && m.siteId && lastSite !== m.siteId) {
        travel = getTravelTime(lastSite, m.siteId);
        cur += travel;
      }
    }
    const st = minToT(cur);
    const dureeUsed = task.overrideDuree || m.duree || '00:00';
    const [dh,dm] = dureeUsed.split(':').map(Number);
    cur += dh*60+dm;
    const et = minToT(cur);
    if (m.siteId) lastSite = m.siteId;
    return { ...task, startTime: st, endTime: et, travelMin: travel, alert, dureeUsed };
  });
}
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══ CHARGEMENT ROUTEOPS (lecture seule) ═══
async function loadRouteOps() {
  const h = { 'apikey': RO_KEY, 'Authorization': 'Bearer ' + RO_KEY };
  const base = RO_URL + '/rest/v1';
  try {
    const [sitesR, missionsR, sheetsR, travelR] = await Promise.all([
      fetch(base + '/sites?active=eq.true&order=name', { headers: h }).then(r => r.json()).catch(() => []),
      fetch(base + '/missions?active=eq.true', { headers: h }).then(r => r.json()).catch(() => []),
      fetch(base + '/sheets?active=eq.true', { headers: h }).then(r => r.json()).catch(() => []),
      fetch(base + '/travel?select=*', { headers: h }).then(r => r.json()).catch(() => []),
    ]);
    S.sites = (sitesR || []).map(r => ({ id:r.id, name:r.name, code:r.code, color:r.color }));
    S.missions = (missionsR || []).map(r => ({
      id:r.id, name:r.name, code:r.code||'', siteId:r.site_id, type:r.type||'',
      duree:r.duree||'00:30', fixed:r.fixed||false, desc:r.description||''
    }));
    S.sheets = (sheetsR || []).map(r => ({
      id:r.id, name:r.name, cat:r.cat, isTemplate:r.is_template, date:r.date,
      startTime:r.start_time, endTime:r.end_time||'', endService:r.end_time||'',
      status:r.status||'actif', tasks: Array.isArray(r.tasks) ? r.tasks : [],
      note:r.note||'', observations:r.observations||''
    }));
    S.travel = {};
    (travelR || []).forEach(t => {
      if (!S.travel[t.site_a]) S.travel[t.site_a] = {};
      S.travel[t.site_a][t.site_b] = t.minutes;
    });
  } catch (err) {
    document.getElementById('sheets-list').innerHTML =
      `<div class="state-msg"><div class="ico">⚠️</div><p>Impossible de charger le planning.<br><small>${err.message}</small></p></div>`;
  }
}

// ═══ SÉLECTION DATE / FEUILLE ═══
function onDateChange() {
  renderSheetsList();
}

function renderSheetsList() {
  const date = document.getElementById('date-picker').value || todayStr();
  const sheets = getInstancesForDate(date).slice().sort((a, b) => (a.startTime || '99:99').localeCompare(b.startTime || '99:99'));
  const el = document.getElementById('sheets-list');

  if (sheets.length === 0) {
    el.innerHTML = `<div class="state-msg"><div class="ico">📋</div><p>Aucune feuille de route pour cette date.</p></div>`;
    return;
  }

  const catL = {
    'patrouille-semaine':'Patrouille · Semaine','patrouille-we':'Patrouille · WE',
    'mdp-semaine':'MDP · Semaine','mdp-we':'MDP · WE',
    'regm-semaine':'REGM · Semaine','regm-we':'REGM · WE','special':'Spécial'
  };

  el.innerHTML = sheets.map(sh => {
    const calc = calcSheetTimes(sh);
    const lastEnd = calc.filter(r => r.endTime).pop()?.endTime || '—';
    const endService = sh.endService || lastEnd;
    const siteCount = {};
    calc.forEach(r => { const m = getMission(r.mId); if (m?.siteId) siteCount[m.siteId] = (siteCount[m.siteId]||0)+1; });
    const pills = Object.keys(siteCount).map(sid => {
      const s = getSite(sid);
      return s ? `<span class="site-pill" style="background:${s.color}">${escHtml(s.code)}</span>` : '';
    }).join('');
    return `<div class="sheet-pick" onclick="openSheet('${sh.id}', '${date}')">
      <div class="sheet-pick-cat">${catL[sh.cat] || sh.cat || ''}</div>
      <div class="sheet-pick-name">${escHtml(sh.name)}</div>
      <div class="sheet-pick-shift">⏱ ${sh.startTime || '—'} → ${endService}</div>
      ${pills ? `<div class="sheet-pick-sites">${pills}</div>` : ''}
    </div>`;
  }).join('');
}

function backToSelect() {
  document.getElementById('screen-sheet').style.display = 'none';
  document.getElementById('screen-select').style.display = 'block';
  document.getElementById('header-sub').textContent = 'Feuille de route';
  currentSheet = null;
}

// ═══ OUVERTURE D'UNE FEUILLE ═══
async function openSheet(sheetId, date) {
  const sh = S.sheets.find(s => s.id === sheetId && s.date === date);
  if (!sh) return;
  currentSheet = sh;

  document.getElementById('screen-select').style.display = 'none';
  document.getElementById('screen-sheet').style.display = 'block';
  document.getElementById('header-sub').textContent = sh.name;

  const detailEl = document.getElementById('sheet-detail');
  detailEl.innerHTML = `<div class="state-msg"><div class="ico">⏳</div><p>Chargement des saisies…</p></div>`;

  await loadPointages(sheetId, date);
  renderSheetDetail(sh, date);
}

async function loadPointages(sheetId, date) {
  pointagesMap = {};
  try {
    const { data, error } = await sb.from('feuille_pointages')
      .select('*')
      .eq('sheet_id', sheetId)
      .eq('sheet_date', date);
    if (error) throw error;
    (data || []).forEach(p => { pointagesMap[p.task_index] = p; });
  } catch (err) {
    // silencieux : si ça échoue, les champs seront simplement vides
  }
}

function renderSheetDetail(sh, date) {
  const calc = calcSheetTimes(sh);
  const lastEnd = calc.filter(r => r.endTime).pop()?.endTime || '—';
  const endService = sh.endService || lastEnd;
  const catL = {
    'patrouille-semaine':'Patrouille · Semaine','patrouille-we':'Patrouille · WE',
    'mdp-semaine':'MDP · Semaine','mdp-we':'MDP · WE',
    'regm-semaine':'REGM · Semaine','regm-we':'REGM · WE','special':'Spécial'
  };

  let html = `<div class="sheet-banner">
    <div class="sheet-banner-cat">${catL[sh.cat] || sh.cat || ''} · ${fmtDateShort(date)}</div>
    <div class="sheet-banner-name">${escHtml(sh.name)}</div>
    <div class="sheet-banner-shift">⏱ Planning théorique : ${sh.startTime || '—'} → ${endService}</div>
  </div>`;

  if (sh.observations) {
    html += `<div class="obs-box"><div class="obs-lbl">📌 Consignes</div>${escHtml(sh.observations).replace(/\n/g,'<br>')}</div>`;
  }

  html += calc.map((r, idx) => {
    const m = getMission(r.mId);
    if (!m) return '';
    const site = getSite(m.siteId);
    const cls = r.alert ? 'alert' : r.fixedStart ? 'fixed' : (m.type === 'autre' ? 'pause' : '');
    const badge = r.alert ? '<span class="task-badge alert">⚠ Impossible</span>' : (r.fixedStart ? '<span class="task-badge fixed">🔒 Fixe</span>' : '');
    const pointage = pointagesMap[idx] || {};
    const arrivee = (pointage.heure_arrivee_reelle || '').slice(0,5);
    const depart = (pointage.heure_depart_reelle || '').slice(0,5);
    const noteVal = pointage.note || '';
    const savedBy = pointage.agent_nom ? `Dernière saisie par ${escHtml(pointage.agent_nom)}` : '';
    return `<div class="task-card ${cls}">
      <div class="task-top">
        ${site ? `<span class="task-dot" style="background:${site.color}"></span>` : ''}
        <span class="task-name">${escHtml(m.name)}</span>
        ${badge}
      </div>
      <div class="task-scheduled">Prévu : ${r.startTime} → ${r.endTime}${site ? ' · ' + escHtml(site.name) : ''}</div>
      ${m.desc ? `<div class="task-desc">${escHtml(m.desc)}</div>` : ''}
      ${r.note ? `<div class="task-note">↳ ${escHtml(r.note)}</div>` : ''}
      <div class="real-times">
        <div class="real-time-field">
          <div class="real-time-lbl">Arrivée réelle <span class="save-ok" id="ok-arr-${idx}">✓</span></div>
          <input type="time" class="real-time-input" id="arr-${idx}" value="${arrivee}"
            onchange="saveRealTime(${idx}, 'heure_arrivee_reelle', this.value)">
        </div>
        <div class="real-time-field">
          <div class="real-time-lbl">Départ réel <span class="save-ok" id="ok-dep-${idx}">✓</span></div>
          <input type="time" class="real-time-input" id="dep-${idx}" value="${depart}"
            onchange="saveRealTime(${idx}, 'heure_depart_reelle', this.value)">
        </div>
      </div>
      <div class="note-field">
        <div class="real-time-lbl">Note (optionnel) <span class="save-ok" id="ok-note-${idx}">✓</span></div>
        <textarea class="note-input" id="note-${idx}" placeholder="Remarque pour cette mission…"
          onchange="saveNote(${idx}, this.value)">${escHtml(noteVal)}</textarea>
      </div>
      <div class="saved-by-line" id="saved-by-${idx}">${savedBy}</div>
    </div>`;
  }).join('');

  document.getElementById('sheet-detail').innerHTML = html;
}

// ═══ SAUVEGARDE (upsert — ne touche que le champ modifié) ═══
async function saveRealTime(taskIndex, field, value) {
  if (!currentSheet) return;
  const date = document.getElementById('date-picker').value || todayStr();
  const m = getMission(currentSheet.tasks[taskIndex]?.mId);

  const payload = {
    sheet_id: currentSheet.id,
    sheet_date: date,
    task_index: taskIndex,
    mission_name: m ? m.name : null,
    agent_id: AGENT_ID,
    agent_nom: AGENT_NOM,
    updated_at: new Date().toISOString()
  };
  payload[field] = value ? value + ':00' : null;

  try {
    const { error } = await sb.from('feuille_pointages')
      .upsert(payload, { onConflict: 'sheet_id,task_index,sheet_date' });
    if (error) throw error;
    pointagesMap[taskIndex] = { ...(pointagesMap[taskIndex] || {}), [field]: payload[field], agent_nom: AGENT_NOM };
    const okId = field === 'heure_arrivee_reelle' ? 'ok-arr-' + taskIndex : 'ok-dep-' + taskIndex;
    const okEl = document.getElementById(okId);
    if (okEl) {
      okEl.classList.add('show');
      setTimeout(() => okEl.classList.remove('show'), 1500);
    }
    updateSavedByCaption(taskIndex);
  } catch (err) {
    alert('Erreur d\'enregistrement : ' + err.message);
  }
}

// ═══ NOTE PAR LIGNE ═══
async function saveNote(taskIndex, value) {
  if (!currentSheet) return;
  const date = document.getElementById('date-picker').value || todayStr();
  const m = getMission(currentSheet.tasks[taskIndex]?.mId);

  const payload = {
    sheet_id: currentSheet.id,
    sheet_date: date,
    task_index: taskIndex,
    mission_name: m ? m.name : null,
    agent_id: AGENT_ID,
    agent_nom: AGENT_NOM,
    note: value || null,
    updated_at: new Date().toISOString()
  };

  try {
    const { error } = await sb.from('feuille_pointages')
      .upsert(payload, { onConflict: 'sheet_id,task_index,sheet_date' });
    if (error) throw error;
    pointagesMap[taskIndex] = { ...(pointagesMap[taskIndex] || {}), note: value || null, agent_nom: AGENT_NOM };
    const okEl = document.getElementById('ok-note-' + taskIndex);
    if (okEl) {
      okEl.classList.add('show');
      setTimeout(() => okEl.classList.remove('show'), 1500);
    }
    updateSavedByCaption(taskIndex);
  } catch (err) {
    alert('Erreur d\'enregistrement : ' + err.message);
  }
}

function updateSavedByCaption(taskIndex) {
  const el = document.getElementById('saved-by-' + taskIndex);
  const nom = pointagesMap[taskIndex]?.agent_nom;
  if (el && nom) el.textContent = 'Dernière saisie par ' + nom;
}

// ═══ INIT ═══
async function init() {
  document.getElementById('agent-badge').textContent = '👤 ' + (AGENT_NOM || '—');
  document.getElementById('date-picker').value = todayStr();
  await loadRouteOps();
  renderSheetsList();
}
init();
</script>
