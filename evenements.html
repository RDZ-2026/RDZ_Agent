<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RDZ — Événements</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rdz-red: #8B1A1A;
      --rdz-red-dark: #6B1212;
      --rdz-red-light: #f5e8e8;
      --rdz-black: #1a1a1a;
      --rdz-gray: #4a4a4a;
      --rdz-border: #d0ccc5;
      --rdz-bg: #f5f4f2;
    }
    body { font-family: Arial, Helvetica, sans-serif; background: var(--rdz-bg); color: var(--rdz-black); min-height: 100vh; }

    /* HEADER */
    .header { background: var(--rdz-red); border-bottom: 4px solid var(--rdz-red-dark); }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .header-brand { padding: 14px 0; }
    .header-brand-name { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: .07em; text-transform: uppercase; }
    .header-brand-sub { font-size: 10px; color: rgba(255,255,255,.6); letter-spacing: .03em; margin-top: 2px; }
    .header-nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn-nav { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 2px; font-size: 12px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; cursor: pointer; transition: all .15s; border: 1.5px solid rgba(255,255,255,.85); background: rgba(255,255,255,.12); color: #fff; text-decoration: none; }
    .btn-nav:hover { background: rgba(255,255,255,.25); }
    .btn-nav-accent { background: #fff; border-color: #fff; color: var(--rdz-red); }
    .btn-nav-accent:hover { background: #f5f5f5; }

    /* TOOLBAR */
    .toolbar { background: #fff; border-bottom: 2px solid var(--rdz-black); padding: 10px 28px; }
    .toolbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .tlabel { font-size: 11px; font-weight: 700; color: var(--rdz-gray); text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
    .tdate, .tsel { padding: 6px 10px; border-radius: 2px; border: 1px solid var(--rdz-border); font-size: 13px; background: #fff; color: var(--rdz-black); }
    .tdate:focus, .tsel:focus { outline: none; border-color: var(--rdz-red); }
    .tsep { width: 1px; height: 18px; background: var(--rdz-border); margin: 0 4px; }

    /* SAVE STATUS */
    .save-status { margin-left: auto; font-size: 11px; display: flex; align-items: center; gap: 6px; color: var(--rdz-gray); }
    .save-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; }
    .save-dot.saving { background: #f59e0b; }
    .save-dot.saved { background: #16a34a; }
    .save-dot.error { background: #dc2626; }

    /* CONTENT */
    .content { max-width: 1200px; margin: 0 auto; padding: 24px 28px; }

    /* EVENT CARD */
    .event-card { background: #fff; border: 1px solid var(--rdz-border); border-left: 4px solid var(--rdz-black); border-radius: 2px; margin-bottom: 14px; overflow: hidden; transition: border-left-color .15s; }
    .event-card.has-agent { border-left-color: var(--rdz-red); }
    .event-card.past { opacity: .55; }

    .event-card-header { padding: 12px 18px; display: flex; align-items: flex-start; gap: 16px; border-bottom: 1px solid var(--rdz-border); }
    .event-time-block { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 70px; background: var(--rdz-black); color: #fff; border-radius: 2px; padding: 8px 10px; text-align: center; flex-shrink: 0; }
    .event-time-block.has-agent { background: var(--rdz-red); }
    .event-time-start { font-size: 16px; font-weight: 700; letter-spacing: .02em; }
    .event-time-sep { font-size: 9px; color: rgba(255,255,255,.5); margin: 1px 0; }
    .event-time-end { font-size: 12px; color: rgba(255,255,255,.75); }

    .event-main { flex: 1; min-width: 0; }
    .event-title { font-size: 14px; font-weight: 700; color: var(--rdz-black); margin-bottom: 5px; line-height: 1.4; }
    .event-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--rdz-gray); }
    .event-meta-item { display: flex; align-items: center; gap: 4px; }
    .event-meta-item strong { color: var(--rdz-black); }

    .event-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
    .ebadge { font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; }
    .ebadge-agent { background: #fee2e2; color: #7f1d1d; }
    .ebadge-info { background: #e0f2fe; color: #0c4a6e; }
    .ebadge-tenue { background: #fef9c3; color: #854d0e; }

    .event-actions { display: flex; gap: 6px; margin-left: 8px; flex-shrink: 0; }
    .icon-btn { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 2px; border: 1px solid var(--rdz-border); background: transparent; color: var(--rdz-gray); cursor: pointer; transition: all .15s; font-size: 14px; }
    .icon-btn:hover { background: var(--rdz-bg); }
    .icon-btn.del:hover { background: #fee2e2; color: #7f1d1d; border-color: #fca5a5; }

    .event-details { padding: 12px 18px 14px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px 20px; background: var(--rdz-bg); border-top: 1px solid var(--rdz-border); }
    .detail-block { }
    .detail-lbl { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--rdz-gray); margin-bottom: 3px; }
    .detail-val { font-size: 12.5px; color: var(--rdz-black); line-height: 1.5; }

    /* JOUR HEADER */
    .day-separator { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--rdz-gray); padding: 16px 0 8px; border-bottom: 2px solid var(--rdz-black); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    .day-count { font-size: 11px; color: #9a9a9a; font-weight: 400; }

    /* EMPTY / LOADING */
    .state-msg { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--rdz-gray); }
    .state-msg .big { font-size: 32px; margin-bottom: 12px; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 2px; border: 1px solid var(--rdz-border); border-top: 3px solid var(--rdz-red); padding: 28px; width: 100%; max-width: 640px; margin: auto; }
    .modal-title { font-size: 13px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--rdz-red); padding-bottom: 16px; border-bottom: 1px solid var(--rdz-border); margin-bottom: 20px; }
    .modal-section { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--rdz-gray); background: var(--rdz-bg); padding: 6px 10px; border-radius: 2px; margin: 18px 0 12px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--rdz-gray); margin-bottom: 5px; }
    .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border-radius: 2px; border: 1px solid var(--rdz-border); font-size: 13px; background: #fff; color: var(--rdz-black); font-family: Arial, sans-serif; }
    .field textarea { min-height: 72px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--rdz-red); }
    .field-hint { font-size: 11px; color: #9a9a9a; margin-top: 4px; font-style: italic; }
    .field-row { display: flex; gap: 12px; }
    .field-row .field { flex: 1; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--rdz-border); }
    .mbtn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 2px; font-size: 12px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
    .mbtn-cancel { background: var(--rdz-bg); border-color: var(--rdz-border); color: var(--rdz-gray); }
    .mbtn-cancel:hover { background: #ebe9e6; }
    .mbtn-save { background: var(--rdz-red); border-color: var(--rdz-red-dark); color: #fff; }
    .mbtn-save:hover { background: var(--rdz-red-dark); }
    .mbtn-save:disabled { opacity: .5; cursor: not-allowed; }

    /* PRINT */
    @page { margin: 14mm 12mm 14mm 12mm; }
    @media print {
      body > * { display: none !important; }
      .print-doc { display: block !important; position: fixed; top: 0; left: 0; width: 100%; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
    .print-doc { display: none; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-brand-name">RDZ Security Management SA</div>
      <div class="header-brand-sub">Événements — Planification & agents</div>
    </div>
    <nav class="header-nav">
      <a class="btn-nav" href="index.html">← Accueil</a>
      <a class="btn-nav" href="parametrage.html">⚙ Sites</a>
      <button class="btn-nav" onclick="showPrintRecap()">📋 Récapitulatif</button>
      <button class="btn-nav" onclick="showPrintODS()">📄 Ordres de service</button>
      <button class="btn-nav btn-nav-accent" onclick="openAdd()">+ Nouvel événement</button>
    </nav>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <span class="tlabel">Date</span>
    <input type="date" class="tdate" id="ref-date" onchange="render()">
    <div class="tsep"></div>
    <span class="tlabel">Site</span>
    <select class="tsel" id="site-filter" onchange="render()">
      <option value="all">Tous les sites</option>
    </select>
    <div class="tsep"></div>
    <span class="tlabel">Vue</span>
    <select class="tsel" id="range-filter" onchange="render()">
      <option value="day">Jour sélectionné</option>
      <option value="week">7 prochains jours</option>
      <option value="all">Tous les événements</option>
    </select>
    <div class="save-status">
      <div class="save-dot" id="save-dot"></div>
      <span id="save-text">Chargement…</span>
    </div>
  </div>
</div>

<div class="content" id="content">
  <div class="state-msg"><div class="big">⏳</div>Chargement…</div>
</div>

<!-- MODAL ÉVÉNEMENT -->
<div class="modal-overlay" id="modal-event">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nouvel événement</div>

    <div class="modal-section">Informations générales</div>
    <div class="field">
      <label>Titre de l'événement *</label>
      <input type="text" id="f-titre" placeholder="Ex : Documentary Screening — Operation Smile">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Site / Lieu principal *</label>
        <select id="f-site"></select>
      </div>
      <div class="field">
        <label>Localisation précise</label>
        <input type="text" id="f-lieu" placeholder="Ex : Auditorium Jacques-Freymond">
        <div class="field-hint">Salle, espace, adresse exacte</div>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Date *</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>Heure de début *</label>
        <input type="time" id="f-heure-debut">
      </div>
      <div class="field">
        <label>Heure de fin</label>
        <input type="time" id="f-heure-fin">
      </div>
    </div>
    <div class="field">
      <label>Contact événement</label>
      <input type="text" id="f-contact" placeholder="Ex : Lyanna Tan, 079 573 60 22">
    </div>

    <div class="modal-section">Sécurité</div>
    <div class="field-row">
      <div class="field">
        <label>Nombre d'agents</label>
        <input type="number" id="f-nb-agents" min="0" value="0">
        <div class="field-hint">0 = agent de site assure le renseignement</div>
      </div>
      <div class="field">
        <label>Tenue requise</label>
        <select id="f-tenue">
          <option value="">— Non précisé —</option>
          <option value="Costume, cravate">Costume, cravate</option>
          <option value="Uniforme RDZ">Uniforme RDZ</option>
          <option value="Tenue de ville">Tenue de ville</option>
          <option value="Tenue de soirée">Tenue de soirée</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Prise de service</label>
        <input type="time" id="f-heure-service">
        <div class="field-hint">Si différente de l'heure début</div>
      </div>
      <div class="field">
        <label>Fin de service</label>
        <input type="time" id="f-heure-fin-service">
      </div>
    </div>
    <div class="field">
      <label>Agent(s) désigné(s)</label>
      <input type="text" id="f-agents" placeholder="Ex : Jean Dupont, Marie Martin">
    </div>
    <div class="field">
      <label>Consignes / Remarques sécurité</label>
      <textarea id="f-consignes" placeholder="Consignes spécifiques pour les agents…"></textarea>
    </div>

    <div class="modal-section">Divers</div>
    <div class="field">
      <label>Remarques ou notes diverses</label>
      <textarea id="f-remarques" placeholder="Configuration, accès, logistique, divers…" style="min-height:60px"></textarea>
    </div>

    <div class="modal-footer">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">Annuler</button>
      <button class="mbtn mbtn-save" id="btn-save" onclick="saveEvent()">✓ Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL RECAP PRINT -->
<div class="modal-overlay" id="modal-recap">
  <div class="modal" style="max-width:780px;max-height:88vh;overflow-y:auto;">
    <div id="recap-inner"></div>
    <div class="modal-footer">
      <button class="mbtn mbtn-cancel" onclick="document.getElementById('modal-recap').classList.remove('open')">Fermer</button>
      <button class="mbtn mbtn-save" id="btn-recap-print" onclick="doPrint('recap-inner', window._recapFilename)">🖨 Imprimer</button>
    </div>
  </div>
</div>

<!-- MODAL ODS PRINT -->
<div class="modal-overlay" id="modal-ods">
  <div class="modal" style="max-width:780px;max-height:88vh;overflow-y:auto;">
    <div id="ods-inner"></div>
    <div class="modal-footer">
      <button class="mbtn mbtn-cancel" onclick="document.getElementById('modal-ods').classList.remove('open')">Fermer</button>
      <button class="mbtn mbtn-save" id="btn-ods-print" onclick="doPrint('ods-inner', window._odsFilename)">🖨 Imprimer</button>
    </div>
  </div>
</div>

<div class="print-doc" id="print-doc"></div>

<script>
const SUPABASE_URL = 'https://pdewmubikmotqzbxmyeq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkZXdtdWJpa21vdHF6YnhteWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDU3MjgsImV4cCI6MjA5NDg4MTcyOH0.SRuhERPmB5_7a58nJ5oMg4a8mujnoLBv8dxkxvyNWao';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let sites = [];
let events = [];
let editId = null;

function today() { return new Date().toISOString().split('T')[0]; }
function fmt(d) { if (!d) return ''; const [y,m,dd] = d.split('-'); return `${dd}.${m}.${y}`; }
function fmtFull(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('fr-CH', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
function addDays(d, n) {
  const dt = new Date(d + 'T00:00:00'); dt.setDate(dt.getDate() + n);
  return dt.toISOString().split('T')[0];
}

function setSave(state, msg) {
  document.getElementById('save-dot').className = 'save-dot' + (state ? ' ' + state : '');
  document.getElementById('save-text').textContent = msg;
}

async function loadAll() {
  try {
    const [{ data: s, error: se }, { data: e, error: ee }] = await Promise.all([
      sb.from('sites').select('*').eq('actif', true).order('nom'),
      sb.from('evenements').select('*').order('date').order('heure_debut')
    ]);
    if (se) throw se;
    sites = s || [];
    events = ee ? [] : (e || []);
    if (ee) console.warn('Table evenements:', ee.message);
    setSave('saved', 'Données chargées');
    render();
  } catch (err) {
    setSave('error', 'Erreur de connexion');
    document.getElementById('content').innerHTML = `
      <div class="state-msg"><div class="big">⚠️</div>Impossible de charger les données.<br><small>${err.message}</small></div>
      <div style="max-width:600px;margin:20px auto;background:#fff;border:1px solid var(--rdz-border);border-left:4px solid var(--rdz-red);padding:20px;border-radius:2px;font-size:13px;line-height:1.7">
        <strong>Table SQL à créer dans Supabase :</strong>
        <pre style="background:#f5f4f2;padding:14px;border-radius:2px;font-size:11px;margin-top:10px;overflow-x:auto">CREATE TABLE evenements (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  site_id uuid REFERENCES sites(id) ON DELETE SET NULL,
  titre text NOT NULL,
  lieu text,
  date date NOT NULL,
  heure_debut time,
  heure_fin time,
  heure_service_debut time,
  heure_service_fin time,
  nb_agents integer DEFAULT 0,
  agents text,
  tenue text,
  contact text,
  consignes text,
  remarques text,
  created_at timestamptz DEFAULT now()
);
ALTER TABLE evenements ENABLE ROW LEVEL SECURITY;
CREATE POLICY "acces_public" ON evenements FOR ALL USING (true) WITH CHECK (true);</pre>
      </div>`;
  }
}

function rebuildSiteFilter() {
  const sel = document.getElementById('site-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="all">Tous les sites</option>' +
    sites.map(s => `<option value="${s.id}">${s.nom}</option>`).join('');
  if (cur) sel.value = cur;
}

function render() {
  rebuildSiteFilter();
  const ref = document.getElementById('ref-date').value || today();
  const siteF = document.getElementById('site-filter').value;
  const range = document.getElementById('range-filter').value;

  let filtered = events.filter(e => {
    if (siteF !== 'all' && e.site_id !== siteF) return false;
    if (range === 'day') return e.date === ref;
    if (range === 'week') return e.date >= ref && e.date <= addDays(ref, 7);
    return true;
  });
  filtered.sort((a, b) => a.date !== b.date ? a.date.localeCompare(b.date) : (a.heure_debut||'').localeCompare(b.heure_debut||''));

  const el = document.getElementById('content');
  if (filtered.length === 0) {
    el.innerHTML = `<div class="state-msg"><div class="big">📅</div>Aucun événement pour cette période.</div>`;
    return;
  }

  const byDate = {};
  filtered.forEach(e => { if (!byDate[e.date]) byDate[e.date] = []; byDate[e.date].push(e); });

  let html = '';
  Object.keys(byDate).sort().forEach(date => {
    const evList = byDate[date];
    const isPast = date < today();
    html += `<div class="day-separator"><span>${fmtFull(date)}</span><span class="day-count">${evList.length} événement${evList.length > 1 ? 's' : ''}</span></div>`;
    evList.forEach(e => {
      const site = sites.find(s => s.id === e.site_id);
      const hasAgent = e.nb_agents > 0;
      html += `<div class="event-card${hasAgent ? ' has-agent' : ''}${isPast ? ' past' : ''}">
        <div class="event-card-header">
          <div class="event-time-block${hasAgent ? ' has-agent' : ''}">
            <div class="event-time-start">${e.heure_debut ? e.heure_debut.slice(0,5) : '?:??'}</div>
            <div class="event-time-sep">↓</div>
            <div class="event-time-end">${e.heure_fin ? e.heure_fin.slice(0,5) : '—'}</div>
          </div>
          <div class="event-main">
            <div class="event-title">${e.titre}</div>
            <div class="event-meta">
              ${site ? `<div class="event-meta-item">📍 <strong>${site.nom}</strong></div>` : ''}
              ${e.lieu ? `<div class="event-meta-item">🚪 ${e.lieu}</div>` : ''}
              ${e.contact ? `<div class="event-meta-item">📞 ${e.contact}</div>` : ''}
            </div>
            <div class="event-badges">
              ${hasAgent
                ? `<span class="ebadge ebadge-agent">👮 ${e.nb_agents} agent${e.nb_agents > 1 ? 's' : ''}</span>`
                : `<span class="ebadge ebadge-info">ℹ Info</span>`}
              ${e.tenue ? `<span class="ebadge ebadge-tenue">👔 ${e.tenue}</span>` : ''}
              ${e.agents ? `<span class="ebadge" style="background:#f0fdf4;color:#166534">✓ ${e.agents}</span>` : ''}
            </div>
          </div>
          <div class="event-actions">
            <button class="icon-btn" onclick="openEdit('${e.id}')" title="Modifier">✎</button>
            <button class="icon-btn del" onclick="deleteEvent('${e.id}')" title="Supprimer">✕</button>
          </div>
        </div>
        ${(e.consignes || e.heure_service_debut || e.remarques) ? `
        <div class="event-details">
          ${e.heure_service_debut ? `<div class="detail-block"><div class="detail-lbl">Prise de service</div><div class="detail-val">${e.heure_service_debut.slice(0,5)}${e.heure_service_fin ? ' → ' + e.heure_service_fin.slice(0,5) : ''}</div></div>` : ''}

function closeModal() { document.getElementById('modal-event').classList.remove('open'); }

async function saveEvent() {
  const titre = document.getElementById('f-titre').value.trim();
  const date = document.getElementById('f-date').value;
  if (!titre) { alert('Veuillez saisir un titre.'); return; }
  if (!date) { alert('Veuillez saisir une date.'); return; }
  const payload = {
    site_id: document.getElementById('f-site').value || null,
    titre, date,
    lieu: document.getElementById('f-lieu').value.trim() || null,
    heure_debut: document.getElementById('f-heure-debut').value || null,
    heure_fin: document.getElementById('f-heure-fin').value || null,
    heure_service_debut: document.getElementById('f-heure-service').value || null,
    heure_service_fin: document.getElementById('f-heure-fin-service').value || null,
    nb_agents: parseInt(document.getElementById('f-nb-agents').value) || 0,
    agents: document.getElementById('f-agents').value.trim() || null,
    tenue: document.getElementById('f-tenue').value || null,
    contact: document.getElementById('f-contact').value.trim() || null,
    consignes: document.getElementById('f-consignes').value.trim() || null,
    remarques: document.getElementById('f-remarques').value.trim() || null,
  };
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  setSave('saving', 'Enregistrement…');
  try {
    if (editId) {
      const { error } = await sb.from('evenements').update(payload).eq('id', editId);
      if (error) throw error;
      const idx = events.findIndex(x => x.id === editId);
      if (idx >= 0) events[idx] = { ...events[idx], ...payload };
    } else {
      const { data, error } = await sb.from('evenements').insert(payload).select().single();
      if (error) throw error;
      events.push(data);
    }
    setSave('saved', 'Sauvegardé ✓');
    setTimeout(() => setSave('', 'Connecté'), 3000);
    closeModal(); render();
  } catch (err) {
    setSave('error', 'Erreur'); alert('Erreur : ' + err.message);
  } finally { btn.disabled = false; }
}

async function deleteEvent(id) {
  if (!confirm('Supprimer cet événement ?')) return;
  setSave('saving', 'Suppression…');
  const { error } = await sb.from('evenements').delete().eq('id', id);
  if (error) { setSave('error', 'Erreur'); alert(error.message); return; }
  events = events.filter(e => e.id !== id);
  setSave('saved', 'Supprimé ✓');
  setTimeout(() => setSave('', 'Connecté'), 3000);
  render();
}

                <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b6b6b;margin-bottom:3px">Astreinte RDZ</div>
                <div style="font-size:14px;font-weight:700;color:#8B1A1A">+41 79 339 13 41</div>
              </td>
              <td style="padding:10px 12px;border-right:1px solid #e5e2dd;width:33%;vertical-align:top">
                <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b6b6b;margin-bottom:3px">Contact événement</div>
                <div style="font-size:13px;color:#1a1a1a">${e.contact || '<span style="color:#ccc;font-style:italic">Non renseigné</span>'}</div>
              </td>
              <td style="padding:10px 12px;width:33%;vertical-align:top">
                <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b6b6b;margin-bottom:3px">Urgences</div>
                <div style="font-size:13px;color:#1a1a1a;line-height:1.6">Police : <strong>117</strong> &nbsp;|&nbsp; Pompiers : <strong>118</strong><br>Ambulance : <strong>144</strong></div>
              </td>
            </tr>
          </table>
        </div>

        ${signatureBlock()}

        <div style="margin-top:16px;border-top:1px solid #d0ccc5;padding-top:8px;display:flex;justify-content:space-between;font-size:12px;color:#9a9a9a">
          <span>RDZ Security Management SA — Document confidentiel à usage interne</span>
          <span>${fmt(e.date)}</span>
        </div>
      </div>`;
    });
  }

  html += `</div>`;
  document.getElementById('ods-inner').innerHTML = html;
  const odsNames = evDay.map(e => e.titre.replace(/[^a-zA-Z0-9À-ÿ\s\-]/g, '').trim().replace(/\s+/g, '_').slice(0, 40));
  window._odsFilename = evDay.length === 1
    ? `RDZ_ODS_${odsNames[0]}_${ref.replace(/-/g, '')}`
    : `RDZ_ODS_${ref.replace(/-/g, '')}_${evDay.length}evenements`;
  document.getElementById('modal-ods').classList.add('open');
}

// ── PRINT ────────────────────────────────────────────────────────────────────
function doPrint(sourceId, filename) {
  document.getElementById('print-doc').innerHTML = document.getElementById(sourceId).innerHTML;
  document.querySelectorAll('.modal-overlay').forEach(o => o.classList.remove('open'));
  const origTitle = document.title;
  if (filename) document.title = filename;
  setTimeout(() => { window.print(); document.title = origTitle; }, 150);
}

// ── BACKDROP ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('ref-date').value = today();
loadAll();
</script>
